<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analog Clock</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f2f2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.clock {
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: white;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.clock::after {
  content: '';
  width: 10px;
  height: 10px;
  background: black;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
}

.number {
  position: absolute;
  top: 50%;
  left: 50%;
  font-size: 16px;
  font-weight: 500;
}

/* Ticks */
.tick {
  position: absolute;
  width: 2px;
  height: 8px;
  background: black;
  top: 50%;
  left: 50%;
}

/* Hands */
.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
}

.hour {
  width: 6px;
  height: 70px;
  background: black;
}

.minute {
  width: 4px;
  height: 100px;
  background: black;
}

.second {
  width: 2px;
  height: 110px;
  background: red;
}
</style>
</head>

<body>

<div class="clock" id="clock"></div>

<script>
const clock = document.getElementById("clock");

/* Numbers */
for (let i = 1; i <= 12; i++) {
  let num = document.createElement("div");
  num.className = "number";
  num.innerText = i;

  let angle = (i - 3) * (Math.PI / 6);
  let radius = 110;

  num.style.left = 150 + radius * Math.cos(angle) + "px";
  num.style.top = 150 + radius * Math.sin(angle) + "px";
  num.style.transform = "translate(-50%, -50%)";

  clock.appendChild(num);
}

/* Ticks */
for (let i = 0; i < 60; i++) {
  let tick = document.createElement("div");
  tick.className = "tick";

  let angle = (i * 6 - 90) * (Math.PI / 180);
  let radius = 135;

  let x = 150 + radius * Math.cos(angle);
  let y = 150 + radius * Math.sin(angle);

  tick.style.left = x + "px";
  tick.style.top = y + "px";
  tick.style.transform = `translate(-50%, -50%) rotate(${i * 6}deg)`;

  if (i % 5 === 0) tick.style.height = "14px";

  clock.appendChild(tick);
}

/* Hands */
const hour = document.createElement("div");
hour.className = "hand hour";

const minute = document.createElement("div");
minute.className = "hand minute";

const second = document.createElement("div");
second.className = "hand second";

clock.appendChild(hour);
clock.appendChild(minute);
clock.appendChild(second);

/* 🔥 FIX: Custom Time Support */
let customTime = localStorage.getItem("customTime");

if (customTime) {
  customTime = new Date(customTime);
}

/* Listen for updates */
window.addEventListener("storage", function(e) {
  if (e.key === "customTime") {
    customTime = new Date(e.newValue);
  }
});

/* Clock logic */
function updateClock() {
  let now;

  if (customTime) {
    now = new Date(customTime);
    now.setSeconds(now.getSeconds() + 1);
    customTime = now;
  } else {
    now = new Date();
  }

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  second.style.transform = `rotate(${secDeg}deg)`;
  minute.style.transform = `rotate(${minDeg}deg)`;
  hour.style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
