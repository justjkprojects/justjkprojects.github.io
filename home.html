<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analog Clock</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { text-align: center; }

.clock {
  width: 260px;
  height: 260px;
  border: 8px solid #333;
  border-radius: 50%;
  position: relative;
  margin: 50px auto;
  background: white;
}

.hand {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: 0% 50%;
  transform: rotate(90deg);
}

.hour {
  width: 70px;
  height: 4px;
  background: black;
}

.minute {
  width: 100px;
  height: 3px;
  background: black;
}

.second {
  width: 110px;
  height: 2px;
  background: red;
}
</style>
</head>

<body class="bg-light">

<div class="container">
  <h3 class="mt-4">Analog Clock</h3>

  <div class="clock">
    <div id="hour" class="hand hour"></div>
    <div id="minute" class="hand minute"></div>
    <div id="second" class="hand second"></div>
  </div>

  <a href="set_time.html" class="btn btn-primary">Set Time</a>
</div>

<script>
let customTime = null;

// Reset on refresh
window.onload = () => {
  localStorage.removeItem("customTime");
};

// Listen for updates from other page
window.addEventListener("storage", function(e) {
  if (e.key === "customTime") {
    customTime = new Date(e.newValue);
  }
});

function updateClock() {
  let now;

  if (customTime) {
    now = new Date(customTime);
    now.setSeconds(now.getSeconds() + 1);
    customTime = now;
  } else {
    now = new Date();
  }

  let sec = now.getSeconds();
  let min = now.getMinutes();
  let hr = now.getHours();

  let secDeg = (sec * 6) + 90;
  let minDeg = (min * 6) + (sec * 0.1) + 90;
  let hrDeg = ((hr % 12) * 30) + (min * 0.5) + 90;

  document.getElementById("second").style.transform = `rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform = `rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform = `rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
</script>

</body>
</html>
