<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set Time</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h3 class="text-center mb-4">Set Clock Time</h3>

  <div class="card shadow p-4">

    <!-- Hours -->
    <div class="mb-3">
      <label class="form-label">Hours (1–12)</label>
      <select id="hours" class="form-select"></select>
    </div>

    <!-- Minutes -->
    <div class="mb-3">
      <label class="form-label">Minutes (0–59)</label>
      <select id="minutes" class="form-select"></select>
    </div>

    <!-- Buttons -->
    <button onclick="setTime()" class="btn btn-success w-100">
      Set Time
    </button>

    <a href="index.html" class="btn btn-secondary w-100 mt-2">
      Back to Clock
    </a>

  </div>
</div>

<script>
// Populate dropdowns
const hours = document.getElementById("hours");
const minutes = document.getElementById("minutes");

for (let i = 1; i <= 12; i++) {
  let opt = document.createElement("option");
  opt.value = i;
  opt.text = i;
  hours.appendChild(opt);
}

for (let i = 0; i < 60; i++) {
  let opt = document.createElement("option");
  opt.value = i;
  opt.text = i;
  minutes.appendChild(opt);
}

// Set time
function setTime() {
  let h = parseInt(hours.value);
  let m = parseInt(minutes.value);

  let now = new Date();

  // Convert to 24h format automatically
  now.setHours(h);
  now.setMinutes(m);

  // Random seconds
  now.setSeconds(Math.floor(Math.random() * 60));

  // Save to localStorage
  localStorage.setItem("customTime", now.toString());

  alert("Time set successfully!");

  // Optional: auto redirect
  //window.location.href = "index.html";
}
</script>

</body>
</html>
